name: MinerU image

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mineru_tag:
        description: Optional MinerU release tag, for example mineru-3.1.14-released
        required: false
        type: string
      push_image:
        description: Push the image to GitHub Container Registry
        required: true
        default: true
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve MinerU release tag
        id: mineru
        run: |
          set -euo pipefail

          manual_tag="${{ inputs.mineru_tag }}"
          if [ -n "${manual_tag}" ]; then
            release_tag="${manual_tag}"
          else
            release_tag="$(
              git ls-remote --tags https://github.com/opendatalab/MinerU.git 'refs/tags/mineru-*-released' |
                awk -F/ '{print $3}' |
                sed 's/\^{}//' |
                sort -V |
                tail -n 1
            )"
          fi

          if [ -z "${release_tag}" ]; then
            echo "Could not resolve a MinerU release tag." >&2
            exit 1
          fi

          version="$(printf '%s' "${release_tag}" | sed -E 's/^mineru-//; s/-released$//')"
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="mineru-${version}"
          push_image="${{ inputs.push_image }}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "push_image=${push_image:-true}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.mineru.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists
        id: image_exists
        if: steps.mineru.outputs.push_image == 'true'
        run: |
          set -euo pipefail

          image="${{ steps.mineru.outputs.image_name }}:${{ steps.mineru.outputs.image_tag }}"
          if docker manifest inspect "${image}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push Docker image
        if: steps.mineru.outputs.push_image != 'true' || steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          push: ${{ steps.mineru.outputs.push_image == 'true' }}
          build-args: |
            MINERU_VERSION=${{ steps.mineru.outputs.version }}
            MINERU_RELEASE_TAG=${{ steps.mineru.outputs.release_tag }}
          tags: |
            ${{ steps.mineru.outputs.image_name }}:${{ steps.mineru.outputs.image_tag }}
            ${{ steps.mineru.outputs.image_name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.mineru.outputs.version }}
            org.opencontainers.image.ref.name=${{ steps.mineru.outputs.release_tag }}
            org.opencontainers.image.description=MinerU API runtime without bundled model weights

      - name: Report existing image
        if: steps.mineru.outputs.push_image == 'true' && steps.image_exists.outputs.exists == 'true'
        run: |
          echo "Image already exists: ${{ steps.mineru.outputs.image_name }}:${{ steps.mineru.outputs.image_tag }}"
